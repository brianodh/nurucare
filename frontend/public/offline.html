<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NuruCare — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #1a1b2e; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 0.95rem; line-height: 1.6; margin-bottom: 0.5rem; }
    .sub { font-size: 0.8rem; color: #9ca3af; margin-top: 1.5rem; }
    button {
      margin-top: 1.5rem;
      background: #5b4fcf;
      color: white;
      border: none;
      border-radius: 9999px;
      padding: 0.65rem 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover { background: #4a3eb8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>Huna muunganiko wa intaneti sasa hivi.</p>
    <p>No internet connection right now.</p>
    <p class="sub">Your intake data has been saved locally and will sync automatically when you reconnect.</p>
    <button onclick="window.location.reload()">Try Again / Jaribu Tena</button>
  </div>
</body>
</html>
